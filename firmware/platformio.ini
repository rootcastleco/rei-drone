; REI Drone - PlatformIO Build Configuration
; Rootcastle Engineering & Innovation
; VTOL Tilt-Rotor UAV Flight Controller Firmware
;
; Target: Pixhawk 6C / Cube Orange (STM32H7 series)
; Framework: Custom bare-metal with HAL
;
; Author: Batuhan Ayribas, M.Sc.

[env:rei_drone]
platform = ststm32
board = genericSTM32H743VI
framework = cmsis
build_flags =
    -D REI_DRONE_VTOL
    -D HSE_VALUE=16000000
    -D NUM_MOTORS=4
    -D TILT_ENABLED=1
    -D TELEMETRY_MAVLINK_V2
    -D BATTERY_CELLS=6
    -O2
    -Wall
    -Wextra
monitor_speed = 115200
upload_protocol = stlink

[env:simulation]
platform = native
build_flags =
    -D REI_DRONE_VTOL
    -D SIMULATION_MODE
    -D NUM_MOTORS=4
    -D TILT_ENABLED=1
    -std=c++17
